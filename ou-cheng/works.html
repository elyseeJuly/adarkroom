<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品管理 - 偶成诗词创作工具</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Crimson+Text&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="main.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper-white: #F7F1E3;
            --ink-black: rgba(26, 26, 26, 0.85);
            --cinnabar-red: #B22222;
            --ink-green: #2d5a3d;
            --gold: #d4af37;
            --gray: #666666;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #f44336;
        }

        body {
            font-family: 'Ma Shan Zheng', serif;
            background: var(--paper-white);
            color: var(--ink-black);
            line-height: 1.6;
            background-image: url('resources/xuan-paper-bg.png');
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(247, 241, 227, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(178, 34, 34, 0.2);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--cinnabar-red);
        }

        .logo-img {
            width: 40px;
            height: 40px;
            margin-right: 12px;
            background: var(--cinnabar-red);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ink-black);
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--cinnabar-red);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--cinnabar-red);
        }

        /* Main Content */
        .main {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            padding: 40px 0;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 48px;
            color: var(--cinnabar-red);
            margin-bottom: 20px;
        }

        .page-subtitle {
            font-size: 20px;
            opacity: 0.8;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            padding: 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(178, 34, 34, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: var(--cinnabar-red);
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 16px;
            opacity: 0.8;
        }

        /* Search and Filter */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 50px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cinnabar-red);
            box-shadow: 0 0 0 3px rgba(178, 34, 34, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--cinnabar-red);
            font-size: 18px;
        }

        .filter-group {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 12px 20px;
            border: 1px solid var(--cinnabar-red);
            border-radius: 20px;
            background: transparent;
            color: var(--cinnabar-red);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 14px;
        }

        .filter-btn.active {
            background: var(--cinnabar-red);
            color: white;
        }

        /* Works Grid */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .work-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(178, 34, 34, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .work-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow);
        }

        .work-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .work-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--cinnabar-red);
            margin-bottom: 5px;
        }

        .work-format {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--gray);
        }

        .format-icon {
            width: 16px;
            height: 16px;
            background: var(--cinnabar-red);
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
        }

        .work-content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
            color: var(--ink-black);
        }

        .work-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--gray);
        }

        .work-author {
            font-weight: bold;
            color: var(--cinnabar-red);
        }

        .work-date {
            opacity: 0.7;
        }

        .work-thoughts {
            margin-top: 15px;
            padding: 12px;
            background: var(--paper-white);
            border-radius: 8px;
            font-size: 14px;
            color: var(--ink-green);
            font-style: italic;
            border-left: 3px solid var(--cinnabar-red);
        }

        .work-actions {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .work-card:hover .work-actions {
            opacity: 1;
        }

        .action-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--cinnabar-red);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .action-icon:hover {
            background: #8b0000;
            transform: scale(1.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(178, 34, 34, 0.1);
        }

        .empty-icon {
            font-size: 64px;
            color: var(--cinnabar-red);
            margin-bottom: 20px;
        }

        .empty-title {
            font-size: 24px;
            color: var(--cinnabar-red);
            margin-bottom: 15px;
        }

        .empty-desc {
            font-size: 16px;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .create-btn {
            padding: 12px 30px;
            background: var(--cinnabar-red);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Ma Shan Zheng', serif;
            text-decoration: none;
            display: inline-block;
        }

        .create-btn:hover {
            background: #8b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(178, 34, 34, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--gray);
        }

        .modal-title {
            font-size: 24px;
            color: var(--cinnabar-red);
            margin-bottom: 20px;
            text-align: center;
        }

        .poster-preview {
            width: 100%;
            height: 400px;
            background: var(--paper-white);
            border: 2px solid var(--cinnabar-red);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .poster-content {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 18px;
            line-height: 2;
            text-align: center;
            padding: 40px;
        }

        .poster-author {
            margin-top: 30px;
            font-size: 14px;
            color: var(--cinnabar-red);
        }

        .poster-seal {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--cinnabar-red);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 30px;
            }

            .nav-content {
                padding: 0 30px;
            }

            .works-grid {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
            }

            .filter-group {
                justify-content: center;
                flex-wrap: wrap;
            }

            .page-title {
                font-size: 36px;
            }
        }

        /* Animation Classes */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
        }

        .slide-in-left {
            opacity: 0;
            transform: translateX(-50px);
        }

        .slide-in-right {
            opacity: 0;
            transform: translateX(50px);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <div class="logo">
                <div class="logo-img">偶</div>
                偶成
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="create.html">创作</a></li>
                <li><a href="works.html" class="active">作品</a></li>
                <li><a href="classics.html">赏读</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="page-header fade-in">
                <h1 class="page-title">作品管理</h1>
                <p class="page-subtitle">传承经典，创新未来</p>
            </div>

            <!-- Stats Bar -->
            <div class="stats-bar fade-in">
                <div class="stat-item">
                    <div class="stat-number" id="totalWorks">15</div>
                    <div class="stat-label">总作品数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="thisMonth">3</div>
                    <div class="stat-label">本月新增</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="verticalCount">8</div>
                    <div class="stat-label">竖排作品</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="favoriteCount">5</div>
                    <div class="stat-label">收藏作品</div>
                </div>
            </div>

            <!-- Search and Filter -->
            <div class="controls fade-in">
                <div class="search-box">
                    <div class="search-icon">🔍</div>
                    <input type="text" class="search-input" placeholder="搜索作品标题、内容或作者..." id="searchInput">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="vertical">竖排</button>
                    <button class="filter-btn" data-filter="horizontal">横排</button>
                    <button class="filter-btn" data-filter="sonnet">十四行诗</button>
                    <button class="filter-btn" data-filter="modern">近体诗</button>
                    <button class="filter-btn" data-filter="ci">词牌</button>
                </div>
            </div>

            <!-- Works Grid -->
            <div class="works-grid" id="worksGrid">
                <!-- Works will be populated by JavaScript -->
            </div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📜</div>
                <h3 class="empty-title">暂无作品</h3>
                <p class="empty-desc">开始您的诗词创作之旅吧</p>
                <a href="create.html" class="create-btn">开始创作</a>
            </div>
        </div>
    </main>

    <!-- Poster Modal -->
    <div class="modal" id="posterModal">
        <div class="modal-content">
            <button class="modal-close" id="modalClose">&times;</button>
            <h3 class="modal-title">生成宣纸海报</h3>
            <div class="poster-preview" id="posterPreview">
                <div class="poster-content">
                    <div>山光悦鸟性</div>
                    <div>潭影空人心</div>
                    <div>万籁此都寂</div>
                    <div>但余钟磬音</div>
                    <div class="poster-author">—— 常建</div>
                </div>
                <div class="poster-seal">偶</div>
            </div>
            <div style="text-align: center;">
                <button class="create-btn" id="downloadBtn">下载海报</button>
            </div>
        </div>
    </div>

    <script>
        let sampleWorks = [];
        let filteredWorks = [];
        let currentFilter = 'all';
        let currentSearch = '';

        // Initialize page
        document.addEventListener('DOMContentLoaded', function () {
            // Load works from localStorage
            if (window.OuCheng && window.OuCheng.StorageManager) {
                sampleWorks = window.OuCheng.StorageManager.get('works', []);
                // If empty, supply some default mocks
                if (sampleWorks.length === 0) {
                    sampleWorks = [
                        {
                            id: 'mock1', title: '春日偶成', content: '春风拂面柳如烟，\n桃花流水自年年。\n人间万事东流水，\n只有诗情似旧年。',
                            author: '墨韵轩主', date: '2024-11-20T10:00:00Z', format: 'vertical', type: 'modern', thoughts: '春日游园，见桃花盛开，有感而作。', favorite: true
                        },
                        {
                            id: 'mock2', title: '秋夜思', content: '银烛秋光冷画屏，\n轻罗小扇扑流萤。\n天阶夜色凉如水，\n卧看牵牛织女星。',
                            author: '清风居士', date: '2024-11-18T10:00:00Z', format: 'vertical', type: 'modern', thoughts: '秋夜独处，望月思人，情之所至。', favorite: false
                        }
                    ];
                    window.OuCheng.StorageManager.set('works', sampleWorks);
                }
            }

            filteredWorks = [...sampleWorks];

            initializePage();
            renderWorks();
            initializeSearch();
            initializeFilters();
            initializeModal();
            initializeAnimations();
        });

        // Initialize page
        function initializePage() {
            updateStats();
        }

        // Update statistics
        function updateStats() {
            const totalWorks = filteredWorks.length;
            const thisMonth = filteredWorks.filter(work => {
                const workDate = new Date(work.date);
                const now = new Date();
                return workDate.getMonth() === now.getMonth() &&
                    workDate.getFullYear() === now.getFullYear();
            }).length;
            const verticalCount = filteredWorks.filter(work => work.format === 'vertical').length;
            const favoriteCount = filteredWorks.filter(work => work.favorite).length;

            document.getElementById('totalWorks').textContent = totalWorks;
            document.getElementById('thisMonth').textContent = thisMonth;
            document.getElementById('verticalCount').textContent = verticalCount;
            document.getElementById('favoriteCount').textContent = favoriteCount;
        }

        // Render works
        function renderWorks() {
            const grid = document.getElementById('worksGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredWorks.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';

            grid.innerHTML = filteredWorks.map(work => `
                <div class="work-card" data-id="${work.id}">
                    <div class="work-actions">
                        <button class="action-icon" onclick="editWork('${work.id}')" title="编辑">✏️</button>
                        <button class="action-icon" onclick="generatePoster('${work.id}')" title="生成海报">🖼️</button>
                        <button class="action-icon" onclick="toggleFavorite('${work.id}')" title="${work.favorite ? '取消收藏' : '收藏'}">${work.favorite ? '❤️' : '🤍'}</button>
                        <button class="action-icon" onclick="deleteWork('${work.id}')" title="删除">🗑️</button>
                    </div>
                    
                    <div class="work-header">
                        <div>
                            <h3 class="work-title">${work.title}</h3>
                            <div class="work-format">
                                <div class="format-icon">${work.format === 'vertical' ? '竖' : '横'}</div>
                                <span>${getTypeLabel(work.type)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="work-content">${work.content.replace(/\n/g, '<br>')}</div>
                    
                    <div class="work-meta">
                        <span class="work-author">—— ${work.author}</span>
                        <span class="work-date">${formatDate(work.date)}</span>
                    </div>
                    
                    ${work.thoughts ? `<div class="work-thoughts">${work.thoughts}</div>` : ''}
                </div>
            `).join('');

            // Add stagger animation
            anime({
                targets: '.work-card',
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 600,
                delay: anime.stagger(100),
                easing: 'easeOutQuart'
            });
        }

        // Get type label
        function getTypeLabel(type) {
            const labels = {
                'modern': '近体诗',
                'ci': '词牌',
                'sonnet': '十四行诗',
                'free': '自由诗'
            };
            return labels[type] || '未知';
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // Initialize search
        function initializeSearch() {
            const searchInput = document.getElementById('searchInput');

            searchInput.addEventListener('input', function () {
                currentSearch = this.value.toLowerCase();
                filterWorks();
            });
        }

        // Initialize filters
        function initializeFilters() {
            const filterBtns = document.querySelectorAll('.filter-btn');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    currentFilter = this.dataset.filter;
                    filterWorks();
                });
            });
        }

        // Filter works
        function filterWorks() {
            filteredWorks = sampleWorks.filter(work => {
                // Type filter
                if (currentFilter !== 'all' && work.type !== currentFilter && work.format !== currentFilter) {
                    return false;
                }

                // Search filter
                if (currentSearch && !(
                    work.title.toLowerCase().includes(currentSearch) ||
                    work.content.toLowerCase().includes(currentSearch) ||
                    work.author.toLowerCase().includes(currentSearch)
                )) {
                    return false;
                }

                return true;
            });

            updateStats();
            renderWorks();
        }

        // Work actions
        function editWork(id) {
            const work = sampleWorks.find(w => w.id === id);
            if (work) {
                // In a real app, this would navigate to edit page
                alert(`编辑作品：${work.title}`);
                console.log('Edit work:', work);
            }
        }

        function generatePoster(id) {
            const work = sampleWorks.find(w => w.id === id);
            if (work) {
                showPosterModal(work);
            }
        }

        function toggleFavorite(id) {
            const work = sampleWorks.find(w => w.id === id);
            if (work) {
                work.favorite = !work.favorite;
                if (window.OuCheng && window.OuCheng.StorageManager) {
                    window.OuCheng.StorageManager.set('works', sampleWorks);
                }
                updateStats();
                renderWorks();
            }
        }

        function deleteWork(id) {
            if (confirm('确定要删除这个作品吗？此操作不可撤销。')) {
                const index = sampleWorks.findIndex(w => w.id === id);
                if (index > -1) {
                    sampleWorks.splice(index, 1);
                    if (window.OuCheng && window.OuCheng.StorageManager) {
                        window.OuCheng.StorageManager.set('works', sampleWorks);
                    }
                    filterWorks();
                }
            }
        }

        // Modal functionality
        function initializeModal() {
            const modal = document.getElementById('posterModal');
            const closeBtn = document.getElementById('modalClose');
            const downloadBtn = document.getElementById('downloadBtn');

            closeBtn.addEventListener('click', hidePosterModal);

            modal.addEventListener('click', function (e) {
                if (e.target === modal) {
                    hidePosterModal();
                }
            });

            downloadBtn.addEventListener('click', function () {
                // Simulate download
                anime({
                    targets: this,
                    scale: [1, 0.95, 1],
                    duration: 200,
                    easing: 'easeInOutQuad'
                });

                const originalText = this.textContent;
                this.textContent = '下载中...';

                setTimeout(() => {
                    this.textContent = '下载完成';
                    setTimeout(() => {
                        this.textContent = originalText;
                        hidePosterModal();
                    }, 1000);
                }, 1500);
            });
        }

        function showPosterModal(work) {
            const modal = document.getElementById('posterModal');
            const preview = document.getElementById('posterPreview');

            // Update poster content
            const content = preview.querySelector('.poster-content');
            content.innerHTML = work.content.replace(/\n/g, '<br>') +
                `<div class="poster-author">—— ${work.author}</div>`;

            modal.classList.add('show');

            // Animation
            anime({
                targets: '.modal-content',
                scale: [0.8, 1],
                opacity: [0, 1],
                duration: 300,
                easing: 'easeOutQuart'
            });
        }

        function hidePosterModal() {
            const modal = document.getElementById('posterModal');

            anime({
                targets: '.modal-content',
                scale: [1, 0.8],
                opacity: [1, 0],
                duration: 200,
                easing: 'easeInQuart',
                complete: () => {
                    modal.classList.remove('show');
                }
            });
        }

        // Initialize animations
        function initializeAnimations() {
            // Page header animation
            anime({
                targets: '.page-title',
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 800,
                delay: 200,
                easing: 'easeOutQuart'
            });

            anime({
                targets: '.page-subtitle',
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 600,
                delay: 400,
                easing: 'easeOutQuart'
            });

            // Stats bar animation
            anime({
                targets: '.stats-bar',
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 600,
                delay: 600,
                easing: 'easeOutQuart'
            });

            // Controls animation
            anime({
                targets: '.controls',
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 600,
                delay: 800,
                easing: 'easeOutQuart'
            });

            // Animate stats numbers
            const statNumbers = document.querySelectorAll('.stat-number');
            statNumbers.forEach((stat, index) => {
                const finalValue = parseInt(stat.textContent);
                anime({
                    targets: { value: 0 },
                    value: finalValue,
                    duration: 1500,
                    delay: 1000 + index * 200,
                    easing: 'easeOutQuart',
                    update: function (anim) {
                        stat.textContent = Math.round(anim.animatables[0].target.value);
                    }
                });
            });
        }
    </script>
</body>

</html>
