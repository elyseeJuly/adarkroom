<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创作 - 偶成诗词创作工具</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Crimson+Text&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="js/validation.js"></script>
    <script src="main.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --paper-white: #F7F1E3;
            --ink-black: rgba(26, 26, 26, 0.85);
            --cinnabar-red: #B22222;
            --ink-green: #2d5a3d;
            --gold: #d4af37;
            --gray: #666666;
            --shadow: rgba(0, 0, 0, 0.1);
            --success: #4CAF50;
            --warning: #FF9800;
            --error: #f44336;
        }

        body {
            font-family: 'Ma Shan Zheng', serif;
            background: var(--paper-white);
            color: var(--ink-black);
            line-height: 1.6;
            background-image: url('resources/xuan-paper-bg.png');
            background-size: cover;
            background-attachment: fixed;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        /* Navigation */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(247, 241, 227, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            padding: 20px 0;
            border-bottom: 1px solid rgba(178, 34, 34, 0.2);
        }

        .nav-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 60px;
        }

        .logo {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--cinnabar-red);
        }

        .logo-img {
            width: 40px;
            height: 40px;
            margin-right: 12px;
            background: var(--cinnabar-red);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--ink-black);
            font-size: 18px;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--cinnabar-red);
        }

        .nav-links a.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--cinnabar-red);
        }

        /* Main Content */
        .main {
            margin-top: 100px;
            min-height: calc(100vh - 100px);
            padding: 40px 0;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 48px;
            color: var(--cinnabar-red);
            margin-bottom: 20px;
        }

        .page-subtitle {
            font-size: 20px;
            opacity: 0.8;
        }

        /* Mode Toggle */
        .mode-toggle {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
            background: white;
            border-radius: 50px;
            padding: 8px;
            box-shadow: 0 4px 15px var(--shadow);
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            background: transparent;
            border-radius: 40px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Ma Shan Zheng', serif;
        }

        .mode-btn.active {
            background: var(--cinnabar-red);
            color: white;
            box-shadow: 0 2px 10px rgba(178, 34, 34, 0.3);
        }

        /* Creation Interface */
        .creation-interface {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 40px;
        }

        .creation-panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(178, 34, 34, 0.1);
        }

        .panel-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--cinnabar-red);
            text-align: center;
        }

        /* Free Creation */
        .free-creation {
            display: block;
        }

        .creation-textarea {
            width: 100%;
            min-height: 200px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 18px;
            line-height: 1.8;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .creation-textarea:focus {
            outline: none;
            border-color: var(--cinnabar-red);
            box-shadow: 0 0 0 3px rgba(178, 34, 34, 0.1);
        }

        .sonnet-section {
            margin-top: 20px;
            padding: 20px;
            background: var(--paper-white);
            border-radius: 8px;
            border: 1px solid rgba(178, 34, 34, 0.2);
        }

        .sonnet-types {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .sonnet-type {
            padding: 8px 16px;
            border: 1px solid var(--cinnabar-red);
            border-radius: 20px;
            background: transparent;
            color: var(--cinnabar-red);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .sonnet-type.active {
            background: var(--cinnabar-red);
            color: white;
        }

        .thoughts-section {
            margin-top: 20px;
        }

        .thoughts-input {
            width: 100%;
            min-height: 80px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 16px;
            resize: vertical;
        }

        .ai-comment {
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, rgba(178, 34, 34, 0.05), rgba(178, 34, 34, 0.1));
            border-radius: 8px;
            border-left: 4px solid var(--cinnabar-red);
            font-style: italic;
            color: var(--ink-green);
        }

        /* Professional Creation */
        .pro-creation {
            display: none;
        }

        .genre-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .genre-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--cinnabar-red);
            border-radius: 8px;
            background: transparent;
            color: var(--cinnabar-red);
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 16px;
        }

        .genre-btn.active {
            background: var(--cinnabar-red);
            color: white;
        }

        .ci-types {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .ci-types.show {
            display: grid;
        }

        .ci-type {
            padding: 8px 12px;
            border: 1px solid var(--cinnabar-red);
            border-radius: 6px;
            background: transparent;
            color: var(--cinnabar-red);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            text-align: center;
        }

        .ci-type.active {
            background: var(--cinnabar-red);
            color: white;
        }

        .rhyme-selector {
            margin-bottom: 20px;
        }

        .rhyme-selector select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 16px;
            background: white;
        }

        .penname-section {
            margin-bottom: 20px;
        }

        .penname-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-family: 'Ma Shan Zheng', serif;
            font-size: 16px;
        }

        /* Preview Panel */
        .preview-panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 30px var(--shadow);
            border: 1px solid rgba(178, 34, 34, 0.1);
        }

        .preview-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .preview-btn {
            padding: 8px 16px;
            border: 1px solid var(--cinnabar-red);
            border-radius: 20px;
            background: transparent;
            color: var(--cinnabar-red);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .preview-btn.active {
            background: var(--cinnabar-red);
            color: white;
        }

        .preview-content {
            min-height: 400px;
            padding: 40px;
            background: var(--paper-white);
            border-radius: 8px;
            border: 2px solid rgba(178, 34, 34, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .vertical-preview {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 20px;
            line-height: 2;
            text-align: right;
            display: none;
        }

        .vertical-preview.show {
            display: block;
        }

        .vertical-preview .line {
            margin-left: 30px;
        }

        .horizontal-preview {
            font-size: 20px;
            line-height: 1.8;
            text-align: center;
            display: none;
        }

        .horizontal-preview.show {
            display: block;
        }

        .poem-author {
            margin-top: 30px;
            font-size: 16px;
            color: var(--cinnabar-red);
        }

        .formatting-marks {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 12px;
            color: var(--gray);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Ma Shan Zheng', serif;
        }

        .save-btn {
            background: var(--cinnabar-red);
            color: white;
        }

        .save-btn:hover {
            background: #8b0000;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(178, 34, 34, 0.3);
        }

        .clear-btn {
            background: var(--gray);
            color: white;
        }

        .clear-btn:hover {
            background: #555;
            transform: translateY(-2px);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 30px;
            }

            .nav-content {
                padding: 0 30px;
            }

            .creation-interface {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .page-title {
                font-size: 36px;
            }

            .sonnet-types {
                flex-wrap: wrap;
            }

            .genre-selector {
                flex-direction: column;
            }

            .ci-types {
                grid-template-columns: 1fr;
            }
        }

        /* Animation Classes */
        .fade-in {
            opacity: 0;
            transform: translateY(30px);
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-content">
            <div class="logo">
                <div class="logo-img">偶</div>
                偶成
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="create.html" class="active">创作</a></li>
                <li><a href="works.html">作品</a></li>
                <li><a href="classics.html">赏读</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main">
        <div class="container">
            <div class="page-header fade-in">
                <h1 class="page-title">诗词创作</h1>
                <p class="page-subtitle">佳句本天成，妙手偶得之</p>
            </div>

            <!-- Mode Toggle -->
            <div class="mode-toggle fade-in">
                <button class="mode-btn active" data-mode="free">自由创作</button>
                <button class="mode-btn" data-mode="pro">专业创作</button>
            </div>

            <!-- Creation Interface -->
            <div class="creation-interface">
                <!-- Creation Panel -->
                <div class="creation-panel fade-in">
                    <!-- Free Creation -->
                    <div class="free-creation">
                        <h3 class="panel-title">自由创作</h3>
                        <textarea class="creation-textarea" placeholder="在此输入您的诗句..." id="creationText"></textarea>

                        <div class="sonnet-section">
                            <h4 style="margin-bottom: 10px; color: var(--cinnabar-red);">十四行诗专区</h4>
                            <div class="sonnet-types">
                                <button class="sonnet-type" data-type="shakespeare">莎士比亚体</button>
                                <button class="sonnet-type" data-type="petrarch">彼特拉克体</button>
                                <button class="sonnet-type" data-type="modern">现代汉语体</button>
                            </div>
                        </div>

                        <div class="thoughts-section">
                            <h4 style="margin-bottom: 10px; color: var(--cinnabar-red);">创作心声</h4>
                            <textarea class="thoughts-input" placeholder="记录您的创作灵感或感想..." id="thoughtsText"></textarea>
                        </div>

                        <div class="ai-comment" id="aiComment">
                            <strong>AI点评：</strong>请输入诗句，我将为您提供雅致的文言点评...
                        </div>
                    </div>

                    <!-- Professional Creation -->
                    <div class="pro-creation">
                        <h3 class="panel-title">专业创作</h3>

                        <div class="genre-selector">
                            <button class="genre-btn active" data-genre="modern">近体诗</button>
                            <button class="genre-btn" data-genre="ci">词牌</button>
                        </div>

                        <div class="ci-types" id="ciTypes">
                            <button class="ci-type" data-ci="xiaoling">小令 ≤58字</button>
                            <button class="ci-type" data-ci="zhongdiao">中调 59-90字</button>
                            <button class="ci-type" data-ci="changdiao">长调 ≥91字</button>
                        </div>

                        <div class="rhyme-selector">
                            <label style="display: block; margin-bottom: 8px; color: var(--cinnabar-red);">韵书选择</label>
                            <select id="rhymeBook">
                                <option value="cilin">词林正韵（默认）</option>
                                <option value="pingshui">平水韵</option>
                                <option value="xin">中华新韵</option>
                            </select>
                        </div>

                        <div class="penname-section">
                            <label style="display: block; margin-bottom: 8px; color: var(--cinnabar-red);">作者笔名</label>
                            <input type="text" class="penname-input" placeholder="请输入笔名" id="penname">
                        </div>

                        <textarea class="creation-textarea" placeholder="在此输入您的诗句，系统将自动检查格律..."
                            id="proCreationText"></textarea>

                        <div class="thoughts-section">
                            <h4 style="margin-bottom: 10px; color: var(--cinnabar-red);">创作心声</h4>
                            <textarea class="thoughts-input" placeholder="记录您的创作灵感或感想..."
                                id="proThoughtsText"></textarea>
                        </div>

                        <div class="ai-comment" id="proAiComment">
                            <strong>AI点评：</strong>请输入诗句，我将为您提供格律分析和雅致点评...
                        </div>
                    </div>
                </div>

                <!-- Preview Panel -->
                <div class="preview-panel fade-in">
                    <h3 class="panel-title">实时预览</h3>

                    <div class="preview-controls">
                        <button class="preview-btn active" data-preview="vertical">竖排</button>
                        <button class="preview-btn" data-preview="horizontal">横排</button>
                    </div>

                    <div class="preview-content">
                        <div class="formatting-marks">
                            <span style="color: var(--success);">■</span> 合律
                            <span style="color: var(--warning);">■</span> 可通押
                            <span style="color: var(--error);">■</span> 不合律
                        </div>

                        <div class="vertical-preview show" id="verticalPreview">
                            <div class="line">山光悦鸟性</div>
                            <div class="line">潭影空人心</div>
                            <div class="line">万籁此都寂</div>
                            <div class="line">但余钟磬音</div>
                            <div class="poem-author">—— 常建《题破山寺后禅院》</div>
                        </div>

                        <div class="horizontal-preview" id="horizontalPreview">
                            <div>山光悦鸟性</div>
                            <div>潭影空人心</div>
                            <div>万籁此都寂</div>
                            <div>但余钟磬音</div>
                            <div class="poem-author">—— 常建《题破山寺后禅院》</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons fade-in">
                <button class="action-btn save-btn" id="saveBtn">保存作品</button>
                <button class="action-btn clear-btn" id="clearBtn">清空重写</button>
            </div>
        </div>
    </main>

    <script>
        // Global variables
        let currentMode = 'free';
        let currentPreview = 'vertical';
        let currentGenre = 'modern';

        // Sample AI comments
        const aiComments = [
            "此诗格律工整，意境深远，颇有唐人风骨。建议第三句可更精炼。",
            "词语清丽，情感真挚。如能加强意象的层次性，当更臻完美。",
            "起承转合自然流畅，末句余韵悠长。格律方面略有瑕疵，需注意平仄。",
            "意境空灵，语言凝练。深得古典诗词之精髓，佳作也。",
            "情景交融，韵味十足。建议在炼字上再下功夫，必成大器。"
        ];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function () {
            initializeModeToggle();
            initializePreviewToggle();
            initializeGenreToggle();
            initializeSonnetTypes();
            initializeCiTypes();
            initializeTextareas();
            initializeActionButtons();
            initializeAnimations();
        });

        // Mode toggle functionality
        function initializeModeToggle() {
            const modeBtns = document.querySelectorAll('.mode-btn');
            const freeCreation = document.querySelector('.free-creation');
            const proCreation = document.querySelector('.pro-creation');

            modeBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    modeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const mode = this.dataset.mode;
                    currentMode = mode;

                    if (mode === 'free') {
                        freeCreation.style.display = 'block';
                        proCreation.style.display = 'none';
                    } else {
                        freeCreation.style.display = 'none';
                        proCreation.style.display = 'block';
                    }

                    updatePreview();
                    generateAIComment();
                });
            });
        }

        // Preview toggle functionality
        function initializePreviewToggle() {
            const previewBtns = document.querySelectorAll('.preview-btn');
            const verticalPreview = document.getElementById('verticalPreview');
            const horizontalPreview = document.getElementById('horizontalPreview');

            previewBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    previewBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const preview = this.dataset.preview;
                    currentPreview = preview;

                    if (preview === 'vertical') {
                        verticalPreview.classList.add('show');
                        horizontalPreview.classList.remove('show');
                    } else {
                        verticalPreview.classList.remove('show');
                        horizontalPreview.classList.add('show');
                    }
                });
            });
        }

        // Genre toggle functionality
        function initializeGenreToggle() {
            const genreBtns = document.querySelectorAll('.genre-btn');
            const ciTypes = document.getElementById('ciTypes');

            genreBtns.forEach(btn => {
                btn.addEventListener('click', function () {
                    genreBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');

                    const genre = this.dataset.genre;
                    currentGenre = genre;

                    if (genre === 'ci') {
                        ciTypes.classList.add('show');
                    } else {
                        ciTypes.classList.remove('show');
                    }
                });
            });
        }

        // Sonnet type selection
        function initializeSonnetTypes() {
            const sonnetTypes = document.querySelectorAll('.sonnet-type');

            sonnetTypes.forEach(type => {
                type.addEventListener('click', function () {
                    sonnetTypes.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');

                    // Update textarea placeholder based on sonnet type
                    const textarea = document.getElementById('creationText');
                    const sonnetType = this.dataset.type;

                    switch (sonnetType) {
                        case 'shakespeare':
                            textarea.placeholder = '莎士比亚体十四行诗：ABAB CDCD EFEF GG韵式，抑扬五音步...';
                            break;
                        case 'petrarch':
                            textarea.placeholder = '彼特拉克体十四行诗：ABBA ABBA + CDC/CDC或CDE/CDE韵式...';
                            break;
                        case 'modern':
                            textarea.placeholder = '现代汉语十四行诗：行长11-15字，第9行必须Volta转折...';
                            break;
                    }
                });
            });
        }

        // Ci type selection
        function initializeCiTypes() {
            const ciTypes = document.querySelectorAll('.ci-type');

            ciTypes.forEach(type => {
                type.addEventListener('click', function () {
                    ciTypes.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');

                    // Here you would load the specific ci pattern
                    const ciType = this.dataset.ci;
                    console.log('Selected ci type:', ciType);
                });
            });
        }

        // Textarea functionality
        function initializeTextareas() {
            const textareas = document.querySelectorAll('.creation-textarea, .thoughts-input');

            textareas.forEach(textarea => {
                textarea.addEventListener('input', function () {
                    updatePreview();
                    generateAIComment();
                });
            });
        }

        // Update preview
        function updatePreview() {
            const text = currentMode === 'free'
                ? document.getElementById('creationText').value
                : document.getElementById('proCreationText').value;

            const penname = currentMode === 'pro'
                ? document.getElementById('penname').value || '佚名'
                : '佚名';

            let lines = text.split('\n');
            let hasContent = lines.some(l => l.trim().length > 0);
            if (!hasContent) {
                lines = ['山光悦鸟性', '潭影空人心', '万籁此都寂', '但余钟磬音'];
            }

            // Clear previews
            const verticalPreview = document.getElementById('verticalPreview');
            const horizontalPreview = document.getElementById('horizontalPreview');
            verticalPreview.innerHTML = '';
            horizontalPreview.innerHTML = '';

            if (currentMode === 'pro' && hasContent) {
                // Pro Mode Validation
                let specificPattern = null;
                if (currentGenre === 'ci') {
                    // Very simple mock: getting pattern based on active ci-type category
                    // Real app would get the specific Ci name
                    const activeType = document.querySelector('.ci-type.active');
                    if (activeType && window.OuCheng.ValidationEngine.ciPatterns[activeType.dataset.ci]) {
                        specificPattern = window.OuCheng.ValidationEngine.ciPatterns[activeType.dataset.ci][0].pattern;
                    }
                }

                const validationResult = window.OuCheng.ValidationEngine.validateProText(text, currentGenre, specificPattern);

                // Add lines to UI with colors
                validationResult.lines.forEach(lineData => {
                    const vLine = document.createElement('div');
                    vLine.className = 'line';
                    const hLine = document.createElement('div');

                    lineData.forEach(charData => {
                        const spanV = document.createElement('span');
                        const spanH = document.createElement('span');
                        spanV.textContent = charData.char;
                        spanH.textContent = charData.char;

                        // Check colors based on validation
                        if (charData.status === 'error') {
                            const color = 'var(--error)';
                            spanV.style.color = color;
                            spanH.style.color = color;
                        } else if (charData.status === 'warning') {
                            const color = 'var(--warning)';
                            spanV.style.color = color;
                            spanH.style.color = color;
                        } else if (charData.status === 'success' && charData.type !== 'punctuation') {
                            const color = 'var(--success)';
                            spanV.style.color = color;
                            spanH.style.color = color;
                        }

                        vLine.appendChild(spanV);
                        hLine.appendChild(spanH);
                    });
                    verticalPreview.appendChild(vLine);
                    horizontalPreview.appendChild(hLine);
                });

            } else {
                // Free Mode or Empty content
                lines.filter(l => l.trim() || !hasContent).forEach(line => {
                    const lineDiv = document.createElement('div');
                    lineDiv.className = 'line';
                    lineDiv.textContent = line;
                    verticalPreview.appendChild(lineDiv);

                    const hLineDiv = document.createElement('div');
                    hLineDiv.textContent = line;
                    horizontalPreview.appendChild(hLineDiv);
                });
            }

            // Add Author
            const authorDiv = document.createElement('div');
            authorDiv.className = 'poem-author';
            authorDiv.textContent = `—— ${penname}`;
            verticalPreview.appendChild(authorDiv);

            const hAuthorDiv = authorDiv.cloneNode(true);
            horizontalPreview.appendChild(hAuthorDiv);
        }

        // Generate AI comment
        function generateAIComment() {
            const text = currentMode === 'free'
                ? document.getElementById('creationText').value
                : document.getElementById('proCreationText').value;

            const aiCommentElement = currentMode === 'free'
                ? document.getElementById('aiComment')
                : document.getElementById('proAiComment');

            if (!text.trim()) {
                aiCommentElement.innerHTML = `<strong>AI点评：</strong>请输入诗句，我将为您提供${currentMode === 'free' ? '雅致' : '格律分析和雅致'}点评...`;
                return;
            }

            if (currentMode === 'pro') {
                const result = window.OuCheng.ValidationEngine.validateProText(text, currentGenre);
                let message = `<strong>格律检查：</strong>${result.message}<br>`;

                // Add a random artistic comment
                const randomComment = aiComments[Math.floor(Math.random() * aiComments.length)];
                message += `<strong>AI点评：</strong>${randomComment}`;
                aiCommentElement.innerHTML = message;
            } else {
                // free mode - check sonnet
                const activeSonnet = document.querySelector('.sonnet-type.active');
                if (activeSonnet) {
                    const result = window.OuCheng.ValidationEngine.validateSonnet(text, activeSonnet.dataset.type);
                    let message = `<strong>十四行诗校验：</strong>${result.message}<br>`;
                    let ul = '<ul style="padding-left: 20px; font-size: 0.9em; margin-top:5px;">';
                    result.details.forEach(d => {
                        let color = d.type === 'error' ? 'var(--error)' : (d.type === 'warning' ? 'var(--warning)' : 'var(--success)');
                        let symbol = d.type === 'error' ? '❌' : (d.type === 'warning' ? '⚠️' : '✅');
                        ul += `<li style="color: ${color}">${symbol} ${d.msg}</li>`;
                    });
                    ul += '</ul>';
                    aiCommentElement.innerHTML = message + ul;
                } else {
                    const randomComment = aiComments[Math.floor(Math.random() * aiComments.length)];
                    aiCommentElement.innerHTML = `<strong>AI点评：</strong>${randomComment}`;
                }
            }
        }

        // Action buttons
        function initializeActionButtons() {
            const saveBtn = document.getElementById('saveBtn');
            const clearBtn = document.getElementById('clearBtn');

            saveBtn.addEventListener('click', function () {
                const text = currentMode === 'free'
                    ? document.getElementById('creationText').value
                    : document.getElementById('proCreationText').value;
                const thoughts = currentMode === 'free'
                    ? document.getElementById('thoughtsText').value
                    : document.getElementById('proThoughtsText').value;
                const penname = currentMode === 'pro'
                    ? (document.getElementById('penname').value || '佚名')
                    : '佚名';

                if (!text.trim()) {
                    if (window.OuCheng && window.OuCheng.NotificationManager) {
                        window.OuCheng.NotificationManager.show('诗句不能为空', 'warning');
                    } else {
                        alert('诗句不能为空');
                    }
                    return;
                }

                // Create work object
                const work = {
                    id: window.OuCheng.Utils.generateId(),
                    title: text.split('\n')[0].substring(0, 12).replace(/[，。！？、]/g, ''),
                    content: text,
                    thoughts: thoughts,
                    author: penname,
                    date: new Date().toISOString(),
                    format: currentPreview, // horizontal or vertical
                    type: currentMode === 'free' ? (document.querySelector('.sonnet-type.active') ? 'sonnet' : 'free') : currentGenre,
                    favorite: false
                };

                // Get existing works and add new one
                let works = window.OuCheng.StorageManager.get('works', []);
                works.unshift(work); // Add to beginning
                window.OuCheng.StorageManager.set('works', works);

                // Simulate saving
                anime({
                    targets: this,
                    scale: [1, 0.95, 1],
                    duration: 200,
                    easing: 'easeInOutQuad'
                });

                // Show success message
                const originalText = this.textContent;
                this.textContent = '已保存在本地';
                this.style.background = '#4CAF50';

                if (window.OuCheng && window.OuCheng.NotificationManager) {
                    window.OuCheng.NotificationManager.show('作品已保存到本地', 'success');
                }

                setTimeout(() => {
                    this.textContent = originalText;
                    this.style.background = '';
                }, 2000);
            });

            clearBtn.addEventListener('click', function () {
                if (confirm('确定要清空所有内容吗？')) {
                    // Clear all textareas
                    document.querySelectorAll('.creation-textarea, .thoughts-input').forEach(textarea => {
                        textarea.value = '';
                    });

                    // Clear penname
                    const penname = document.getElementById('penname');
                    if (penname) penname.value = '';

                    // Reset AI comments
                    document.getElementById('aiComment').innerHTML = '<strong>AI点评：</strong>请输入诗句，我将为您提供雅致的文言点评...';
                    document.getElementById('proAiComment').innerHTML = '<strong>AI点评：</strong>请输入诗句，我将为您提供格律分析和雅致点评...';

                    // Reset preview
                    updatePreview();

                    // Animation feedback
                    anime({
                        targets: '.creation-panel',
                        scale: [1, 0.98, 1],
                        duration: 300,
                        easing: 'easeInOutQuad'
                    });
                }
            });
        }

        // Initialize animations
        function initializeAnimations() {
            // Page header animation
            anime({
                targets: '.page-title',
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 800,
                delay: 200,
                easing: 'easeOutQuart'
            });

            anime({
                targets: '.page-subtitle',
                opacity: [0, 1],
                translateY: [20, 0],
                duration: 600,
                delay: 400,
                easing: 'easeOutQuart'
            });

            // Stagger animation for interface elements
            anime({
                targets: '.fade-in',
                opacity: [0, 1],
                translateY: [30, 0],
                duration: 600,
                delay: anime.stagger(100, { start: 600 }),
                easing: 'easeOutQuart'
            });
        }
    </script>
